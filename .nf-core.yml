repository_type: pipeline

nf_core_version: 3.5.2

lint:
  files_unchanged:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-seminar1_logo_light.png
    - docs/images/nf-core-seminar1_logo_light.png
    - docs/images/nf-core-seminar1_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - .prettierignore
    - .github/CONTRIBUTING.md
    - .prettierignore
    - .prettierignore
    - .github/CONTRIBUTING.md
    - assets/sendmail_template.txt
    - .prettierignore
  nextflow_config:
    - manifest.name
    - manifest.homePage
  nf_test_content: false
  multiqc_config: false
  files_exist:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-seminar1_logo_light.png
    - docs/images/nf-core-seminar1_logo_light.png
    - docs/images/nf-core-seminar1_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - .prettierignore
    - .prettierrc.yml
    - .github/workflows/branch.yml
    - .github/workflows/nf-test.yml
    - .github/actions/get-shards/action.yml
    - .github/actions/nf-test/action.yml
    - .github/workflows/linting_comment.yml
    - .github/workflows/linting.yml
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - CHANGELOG.md
    - CITATIONS.md
    - .github/workflows/nf-test.yml
    - .github/actions/get-shards/action.yml
    - .github/actions/nf-test/action.yml
    - nf-test.config
    - tests/default.nf.test
    - assets/multiqc_config.yml
    - assets/email_template.html
    - assets/sendmail_template.txt
    - assets/email_template.txt
  readme:
    - nextflow_badge
    - nfcore_template_badge

template:
  org: hs
  name: seminar1
  description: Bioinformatic workflows seminar pipeline development
  author: Khanh Trinh, Mehraj Yousaf
  version: 1.0.0
  force: true
  outdir: .
  skip_features:
    - github_badges
    - changelog
    - ci
    - nf-test
    - igenomes
    - multiqc
    - fastqc
    - seqera_platform
    - gpu
    - codespaces
    - vscode
    - code_linters
    - citations
    - rocrate
    - email
    - adaptivecard
    - slackreport
  is_nfcore: false
